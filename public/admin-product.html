<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="css/orders.css" />
  <link rel="stylesheet" href="css/admin-product.css" />
    
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>


<body>


<div class="dashboard">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="logo"><img src="images/BFCC82DA-F56B-44C1-9ADC-4446FB8ABD31.png" alt=""></div>
    <button class="close-btn" id="closeSidebar">✕</button>
    <nav>
      <a style="text-decoration: none;" href="admin-dashboard.html">Dashboard</a>
      <a style="text-decoration: none;" href="admin-orders.html">Orders</a>
      <a style="text-decoration: none;"  class="active" href="admin-product.html"   >Products</a>
      <a style="text-decoration: none;" href="admin-upload.html" >Upload</a>
      <a style="text-decoration: none;" href="admin-settings.html" >Settings &nbsp;<i class="fa-solid fa-gear"></i></a>
      <br>
      <br>
      <br>
      <br>
      <br>
      <a>Logout &nbsp;&nbsp; <i class="fa-solid fa-arrow-right-from-bracket"></i></a>
    </nav>
  </aside>







  <!-- Main Content -->
  <main class="main">
    
    <!-- Top Bar -->
    <header class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <h2>Products</h2>
      <div class="profile">Welcome</div>
    </header>

   

  <div class="search-container">
  <i class="fas fa-search"></i>
  <input type="text" id="productSearch" placeholder="Search..." />
  </div>



  <!-- All products -->
<div class="orders-overflow">
 <section class="table-section">

  <!-- Section Header -->
  <div class="section-header">
    <h3>All Products</h3>
    <h4>Product count : <span>0</span></h4>
  </div>

  <table class="product-table">
    <thead>
      <tr>
        <th>Product</th>
        <th>Product ID</th>
        <th>Stock</th>
        <th>Price</th>
        <th>Delete</th>
        <th>View</th>
      </tr>
    </thead>

    <tbody>
      <!-- JS will insert product rows here -->
    </tbody>
  </table>

  <!-- Pagination (optional) -->
  <div id="pagination" class="pagination"></div>

</section>











  <br>
  <br>
  <br>

  <br>
  <br>
  <br>

<!-- ORDER DRAWER -->
<div class="order-drawer" id="orderDrawer">

  <div class="drawer-header">
    <h3>product name:&nbsp;<span> shoes</span></h3>
    <button class="drawer-close" id="closeDrawer">✕</button>
  </div>

  <div class="drawer-content">

    <table class="stock-table">
    <thead>
        <tr>
            <th>Size</th>
            <th>Stock Available</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>S</td>   <!-- main stock details -->
            <td>12</td>
        </tr>
        <tr>
            <td>M</td>
            <td>8</td>
        </tr>
        <tr>
            <td>L</td>
            <td>0</td>
        </tr>
        <tr>
            <td>XL</td>
            <td>5</td>
        </tr>
    </tbody>
    </table>



    


    
    <br>
    <h4>Main Product Image</h4>

    <div class="drawer-items">

      <div class="drawer-item">
        <img src="images/BFCC82DA-F56B-44C1-9ADC-4446FB8ABD31.png" alt="NAN">

      </div>

  <hr>
<br>
    
<div class="variants-container"></div>

    <hr>
    <br>
    <p style="font-size: 15px;"><strong>Price:</strong> ₦ 112,223 </p> <!-- Price detail -->

    <div class="drawer-actions">

 <button class="secondary-btn" id="drawerDeleteBtn">
  Delete &nbsp;<i class="fa-solid fa-trash"></i>
</button>


    </div>
    <br>
  </div>
</div>




</main>
</div>


<script src="./js/admin-products.js"></script>
<script>

const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const closeSidebar = document.getElementById("closeSidebar");

hamburger.addEventListener('click', () => {
  sidebar.classList.toggle('collapsed'); // open / close
});

closeSidebar.addEventListener('click', () => {
  sidebar.classList.remove('collapsed'); // CLOSE
});






















</script>
</body>
</html>
