<section class="s-product">

    </div>

    <!-- Thumbnails / Variants -->

      <!-- Base product image -->

        <img class="small-img"
             data-type="base"
             data-id="">
      </div>

      <!-- Variant image -->

             data-variant-id="">

             data-variant-id="">
      </div>

  </div>

  <!-- RIGHT: Product Details -->

    <h1 class="product-title"></h1>

    <h4 class="product-price"></h4>
    <h3 class="discount-price-card"></h3>

    <br>

    <!-- Variant / Price dropdown -->
    <label for="price-select">Select Variant</label>
    <select id="price-select"></select>

    <br><br>

    <!-- Size -->
    <label for="size-select">Select Size</label>
    <select id="size-select">
      <option disabled selected>Choose a size</option>
    </select>

    <br><br>

    <!-- Quantity -->
    <label>Select Quantity</label>
    <div class="qty-control" data-stock="">
      <button class="qty-btn qty-minus" type="button">−</button>
      <input class="qty-input" type="number" value="1" readonly>
      <button class="qty-btn qty-plus" type="button">+</button>
    </div>

    <br><br>

    <button class="add-to-cart-btn" disabled>
      Add to Cart <i class="fa-solid fa-cart-shopping"></i>
